<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catgebra 🐈🧮</title>
    <meta name="description" content="Μάθε άλγεβρα και λύσε εξισώσεις διασκεδαστικά! Το Catgebra είναι ένα δωρεάν, διαδραστικό εργαλείο μαθηματικών για μαθητές Γυμνασίου και Λυκείου, με αναλυτικά βήματα λύσης.">
    <meta name="keywords" content="άλγεβρα, μαθηματικά, εξισώσεις, γυμνάσιο, λύκειο, catgebra, λύση εξισώσεων, online calculator, βοήθημα μαθηματικών">
    <link href="https://fonts.googleapis.com/css2?family=GFS+Didot&display=swap" rel="stylesheet">
    <script src="https://www.desmos.com/api/v1.8/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- ΕΠΙΛΟΓΗ ΓΛΩΣΣΑΣ -->
        <div style="text-align: right; margin-bottom: 10px;">
            <select id="lang-select" onchange="changeLanguage()" style="background: #252525; border: 1px solid #bb86fc; padding: 5px; border-radius: 5px; color: white;">
                <option value="el">🇬🇷 Ελληνικά</option>
                <option value="en">🇬🇧 English</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="tr">🇹🇷 Türkçe</option>
            </select>
        </div>

        <img src="cat.jpg" alt="Catgebra Mascot" class="mascot">
        
        <h1>Catgebra 🐈🧮</h1>

        <div class="grade-selector">
            <label for="grade-select" id="lbl-level">Επίπεδο Σπουδών:</label>
            <select id="grade-select" onchange="changeGrade()">
                <!-- Τα options γεμίζουν αυτόματα από το JavaScript πλέον -->
            </select>
        </div>
        
        <div class="stats">
            <p><span id="lbl-score">Σκορ:</span> <span id="score" class="highlight-text">0</span> | <span id="lbl-time">Χρόνος:</span> <span id="timer" class="highlight-text">00:00</span></p>
            <button onclick="toggleStats()" class="stats-btn" id="btn-stats">📊 Στατιστικά</button>
        </div>

        <div class="quiz-box">
            <p id="equation" class="equation-text">Φόρτωση...</p>
            
            <div class="input-container">
                <input type="text" id="answer" placeholder="Απάντηση...">
                <button onclick="toggleKeyboard()" class="kbd-toggle">⌨️</button>
            </div>

           <div id="math-keyboard" class="math-keyboard hidden">
                <!-- 1η Γραμμή: Δυνάμεις & Ρίζες -->
                <button onclick="insertSymbol('²')">x²</button>
                <button onclick="insertSymbol('³')">x³</button>
                <button onclick="insertSymbol('^')">x^y</button>
                <button onclick="insertSymbol('√()')">√</button>
                <button onclick="insertSymbol('∛()')">∛</button>

                <!-- 2η Γραμμή: Παρενθέσεις & Κλάσματα -->
                <button onclick="insertSymbol('/')">x/y</button>
                <button onclick="insertSymbol('(')">(</button>
                <button onclick="insertSymbol(')')">)</button>
                <button onclick="insertSymbol('|')">|x|</button>
                <button onclick="insertSymbol('±')">±</button>

                <!-- 3η Γραμμή: Απειροστικός Λογισμός -->
                <button onclick="insertSymbol('∫')">∫</button>
                <button onclick="insertSymbol('d/dx')">d/dx</button>
                <button onclick="insertSymbol('lim()')">lim</button>
                <button onclick="insertSymbol('Σ')">Σ</button>
                <button onclick="insertSymbol('∞')">∞</button>

                <!-- 4η Γραμμή: Τριγωνομετρία & Λογάριθμοι -->
                <button onclick="insertSymbol('sin()')">sin</button>
                <button onclick="insertSymbol('cos()')">cos</button>
                <button onclick="insertSymbol('tan()')">tan</button>
                <button onclick="insertSymbol('log()')">log</button>
                <button onclick="insertSymbol('ln()')">ln</button>

                <!-- 5η Γραμμή: Σταθερές & Σύμβολα -->
                <button onclick="insertSymbol('π')">π</button>
                <button onclick="insertSymbol('e')">e</button>
                <button onclick="insertSymbol('≤')">≤</button>
                <button onclick="insertSymbol('≥')">≥</button>
                <button onclick="insertSymbol('≠')">≠</button>
            </div>
            
            <div class="buttons-group">
                <button onclick="checkAnswer()" class="check-btn" id="btn-check">Έλεγχος</button>
                <button onclick="showHelp()" class="help-btn" id="btn-help">Βήμα-Βήμα</button>
                <button onclick="skipProblem()" class="skip-btn" id="btn-skip">Παράλειψη</button>
            </div>
            
            <p id="feedback"></p>
            <div id="help-steps" class="help-steps hidden"></div>

            <div class="notes-container">
                <label for="user-notes" id="lbl-notes">Πρόχειρο Σημειώσεων 📝</label>
                <textarea id="user-notes" placeholder="Γράψε εδώ τις σκέψεις σου..."></textarea>
            </div>

            <div id="calculator" class="graph-box"></div>
        </div>
        
        <button onclick="resetProgress()" class="reset-btn" id="btn-reset" style="margin-top:20px;">Μηδενισμός</button>
    </div>

    <div id="stats-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">Τα Στατιστικά μου 📊</h2>
            <p><span id="lbl-played">Λυμένες Ασκήσεις:</span> <span id="stat-played" class="stat-num">0</span></p>
            <p><span id="lbl-correct">Σωστές Απαντήσεις:</span> <span id="stat-correct" class="stat-num">0</span></p>
            <p><span id="lbl-rate">Ποσοστό Επιτυχίας:</span> <span id="stat-rate" class="stat-num">0%</span></p>
            <button onclick="toggleStats()" class="skip-btn" id="btn-close" style="margin-top: 20px;">Κλείσιμο</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
